<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Narrative Tools</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fafaf7;
      color: #111;
      margin: 0;
      padding: 3rem 1rem;
      line-height: 1.55;
    }
    main { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 2rem; margin: 0 0 0.25rem; letter-spacing: -0.02em; }
    .sub { color: #555; margin: 0 0 2rem; }
    .tool {
      display: block;
      background: white;
      border: 1px solid #e5e5e0;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.75rem;
      text-decoration: none;
      color: inherit;
      transition: all 0.15s;
    }
    .tool:hover { border-color: #111; transform: translateY(-1px); }
    .tool h2 { margin: 0 0 0.25rem; font-size: 1.1rem; }
    .tool p { margin: 0; color: #555; font-size: 0.95em; }
    .tool .client { display: inline-block; font-size: 0.75em; font-weight: 600; padding: 0.15rem 0.5rem; background: #f0f0ec; border-radius: 4px; margin-bottom: 0.5rem; letter-spacing: 0.02em; text-transform: uppercase; color: #555; }
    footer { max-width: 720px; margin: 3rem auto 0; text-align: center; color: #999; font-size: 0.85em; }
  </style>
</head>
<body>
  <main>
    <h1>Narrative Tools</h1>
    <p class="sub">Self-service tools for Narrative clients.</p>

    <a class="tool" href="./rentman-converter/">
      <span class="client">Brownys Event Productions</span>
      <h2>Rentman → Ronnie Materiaallijst Converter</h2>
      <p>Converts a Rentman Excel export into the markdown file Rentman Ronnie (Custom GPT) uses as knowledge base.</p>
    </a>
  </main>
  <footer>Narrative — AI consultancy for event professionals</footer>
</body>
</html>
